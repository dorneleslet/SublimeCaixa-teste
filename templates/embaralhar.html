<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Procedimentos</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background-color: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 800px;
        }

        h1 {
            color: #333;
            text-align: center;
        }

        .input-group {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr 1fr auto;
            gap: 10px;
            margin-bottom: 20px;
            align-items: end;
        }

        .form-control {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.85rem;
            margin-bottom: 4px;
            color: #666;
            font-weight: bold;
        }

        input, select {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
            height: 42px; /* Alinhar com inputs */
        }

        #btnAdd {
            background-color: #28a745;
            color: white;
        }

        #btnAdd:hover {
            background-color: #218838;
        }

        .actions {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }

        #btnShuffle {
            background-color: #007bff;
            color: white;
        }

        #btnShuffle:hover {
            background-color: #0056b3;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #f8f9fa;
            color: #333;
        }

        tr:hover {
            background-color: #f1f1f1;
        }

        /* Responsividade para telas menores */
        @media (max-width: 600px) {
            .input-group {
                grid-template-columns: 1fr;
            }
            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Lista de Procedimentos</h1>

    <!-- Área de Inserção -->
    <div class="input-group">
        <div class="form-control">
            <label for="procId">Procedimento</label>
            <select id="procId">
                <option value="" disabled selected>Selecione um procedimento</option>
                <option value="Corte">Corte</option>
                <option value="Liso">Liso</option>
                <option value="Coloração">Coloração</option>
                <option value="Iluminado">Iluminado</option>
                <option value="Loiro">Loiro</option>
                <option value="Tratamento">Tratamento</option>
            </select>
        </div>
        <div class="form-control">
            <label for="procCurvature">Curvatura</label>
            <select id="procCurvature">
                <option value="cacho">Cacho</option>
                <option value="liso">Liso</option>
            </select>
        </div>
        <div class="form-control">
            <label for="procName">Nome</label>
            <input type="text" id="procName" placeholder="Ex: Ana Moraes">
        </div>
       
        <div class="form-control">
            <label for="procType">Tipo</label>
            <select id="procType">
                <option value="Reels">Reels</option>
                <option value="Feed">Feed</option>
            </select>
        </div>
        <button id="btnAdd" onclick="addProcedure()">Adicionar</button>
    </div>

    <!-- Área de Ações -->
    <div class="actions">
        <button id="btnShuffle" type="button" class="btn btn-secondary" onclick="shuffleProcedures()">
            ⚡ Misturar / Embaralhar
        </button>
    </div>

    <!-- Tabela de Listagem -->
    <table>
        <thead>
            <tr>
                <th>Procedimento</th>
                <th>Nome</th>
                <th>Tipo</th>
                <th>Curvatura</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <!-- Os itens aparecerão aqui -->
        </tbody>
    </table>
</div>

<script>
    // Estado da aplicação (Lista de procedimentos)
    let procedures = [];

    // Função para adicionar novo procedimento
    function addProcedure() {
        const idInput = document.getElementById('procId');
        const nameInput = document.getElementById('procName');
        const typeInput = document.getElementById('procType');
        const curvatureInput = document.getElementById('procCurvature');

        const id = idInput.value.trim();
        const name = nameInput.value.trim();
        const type = typeInput.value;
        const curvature = curvatureInput.value;

        if (id === '' || name === '') {
            alert('Por favor, preencha o código do procedimento e o nome.');
            return;
        }

        const newProc = { id, name, curvature, type };
        procedures.push(newProc);

        // Limpar inputs e focar no primeiro
        idInput.value = '';
        nameInput.value = '';
        idInput.focus();

        renderTable();
    }

    // Função para renderizar a tabela HTML baseada no array
    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = ''; // Limpa a tabela atual

        if (procedures.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#888;">Nenhum procedimento cadastrado.</td></tr>';
            return;
        }

        procedures.forEach(proc => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><strong>${proc.id}</strong></td>
                <td>${proc.name}</td>
                <td>${proc.curvature.charAt(0).toUpperCase() + proc.curvature.slice(1)}</td>
                <td><span style="background:#eee; padding:2px 6px; border-radius:4px; font-size:0.9em;">${proc.type}</span></td>
            `;
            tbody.appendChild(row);
        });
    }

    // Função auxiliar para embaralhar um array (Fisher-Yates)
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    // Algoritmo modificado para atender regras de negócio
    function shuffleProcedures() {
        if (procedures.length < 2) {
            alert("Adicione pelo menos 2 itens para embaralhar.");
            return;
        }

        // 1. Separar em quatro pools (tipo/curvatura) e embaralhar
        const pools = {
            Feed: {
                cacho: procedures.filter(p => p.type === 'Feed' && p.curvature === 'cacho'),
                liso: procedures.filter(p => p.type === 'Feed' && p.curvature === 'liso')
            },
            Reels: {
                cacho: procedures.filter(p => p.type === 'Reels' && p.curvature === 'cacho'),
                liso: procedures.filter(p => p.type === 'Reels' && p.curvature === 'liso')
            }
        };

        shuffleArray(pools.Feed.cacho);
        shuffleArray(pools.Feed.liso);
        shuffleArray(pools.Reels.cacho);
        shuffleArray(pools.Reels.liso);

        let result = [];
        const total = procedures.length;

        for (let i = 0; i < total; i++) {
            // 2. Determinar as propriedades ideais para a posição atual
            const wantReels = (i % 3) === 1;
            const wantLiso = (i % 2) === 1; // 0=cacho, 1=liso

            const wantedType = wantReels ? 'Reels' : 'Feed';
            const wantedCurvature = wantLiso ? 'liso' : 'cacho';

            // 3. Encontrar o melhor pool disponível (com fallback)
            let targetPools = [
                pools[wantedType][wantedCurvature],
                pools[wantedType][wantedCurvature === 'cacho' ? 'liso' : 'cacho'], // Quebra regra de curvatura
                pools[wantedType === 'Feed' ? 'Reels' : 'Feed'][wantedCurvature], // Quebra regra de tipo
                pools[wantedType === 'Feed' ? 'Reels' : 'Feed'][wantedCurvature === 'cacho' ? 'liso' : 'cacho'] // Quebra ambas
            ];

            let pool = targetPools.find(p => p.length > 0);

            if (!pool) break; // Não há mais itens em nenhum pool

            // 4. Regra: Nenhum procedimento com o mesmo nome (id) pode ficar junto
            const lastId = result.length > 0 ? result[result.length - 1].id : null;
            
            // Tenta encontrar um item que seja diferente do anterior
            let selectedIndex = pool.findIndex(p => p.id !== lastId);

            // Se não encontrar (todos iguais), pega o primeiro mesmo (caso limite)
            if (selectedIndex === -1) selectedIndex = 0;
            
            // 5. Adiciona o item selecionado ao resultado e remove do pool
            const selectedItem = pool.splice(selectedIndex, 1)[0];
            result.push(selectedItem);
        }

        procedures = result;
        renderTable();
    }

    // Inicializa a tabela vazia
    renderTable();

    // Permitir adicionar apertando ENTER
    document.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            addProcedure();
        }
    });
</script>



</body>
</html>
